version: '3.8'

services:
  # AAMN Primary Node (Bootstrap Node)
  aamn-node:
    build: .
    image: aamn/node:v0.4
    ports:
      - "9000:9000"             # P2P (public)
      - "127.0.0.1:1080:1080"   # SOCKS5 (local-only)
      - "127.0.0.1:50051:50051" # gRPC Control API (local-only)
      - "127.0.0.1:50052:50052" # REST Control API (local-only)
    volumes:
      - aamn-data:/root/.aamn
    environment:
      - RUST_LOG=info
      # Control-plane authentication token for gRPC/REST APIs.
      # MUST be kept secret and not committed to version control in real deployments.
      # Replace 'change-me-strong-token' with a strong random value before production.
      - AAMN_CONTROL_TOKEN=change-me-strong-token
    restart: unless-stopped

  # AAMN Web Dashboard
  aamn-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: aamn/dashboard:v0.4
    ports:
      - "80:80" # Public Web
    depends_on:
      - aamn-node
    restart: unless-stopped
    environment:
      # The dashboard will prompt for this token and send it as Authorization: Bearer <token>
      # It should match AAMN_CONTROL_TOKEN configured in the node.
      - VITE_AAMN_DASHBOARD_SECURED=true

volumes:
  aamn-data:
